<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Servicios en Agromática — Teledetección y Análisis Ambiental</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,Helvetica,sans-serif;color:#1a1a1a;background:#f4f4f0;line-height:1.6}
a{color:#185FA5}
.hero{background:#042C53;color:#E6F1FB;padding:2.5rem 1.5rem 2rem;text-align:center}
.hero-logo{margin-bottom:12px}
.hero .marca{font-size:26px;font-weight:700;color:#fff;margin-bottom:4px}
.hero .marca span{color:#F5C842}
.hero .tagline{font-size:12px;color:#85B7EB;margin-bottom:8px}
.hero p{font-size:14px;color:#B5D4F4;max-width:520px;margin:0 auto 1rem;font-style:italic}
.badge{display:inline-block;background:#185FA5;color:#B5D4F4;font-size:11px;padding:3px 10px;border-radius:20px;margin:2px 3px}
.resp-bar{background:#0C447C;color:#B5D4F4;font-size:12px;text-align:center;padding:9px 1rem}
.resp-bar strong{color:#E6F1FB}
.section{background:#fff;border-radius:12px;padding:1.5rem 1.25rem;margin:1.25rem auto;max-width:860px}
.section h2{font-size:17px;font-weight:600;color:#042C53;margin-bottom:1rem;padding-bottom:8px;border-bottom:1px solid #e0e0d8}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
.card{background:#f8f8f4;border:1px solid #e0e0d8;border-radius:10px;padding:1rem}
.card-icon{width:36px;height:36px;border-radius:8px;background:#E6F1FB;display:flex;align-items:center;justify-content:center;margin-bottom:10px}
.card-icon svg{width:18px;height:18px;stroke:#185FA5;fill:none;stroke-width:1.5}
.card h3{font-size:14px;font-weight:600;color:#042C53;margin-bottom:5px}
.card p{font-size:13px;color:#555;line-height:1.55}
.card .price{font-size:11px;color:#185FA5;font-weight:600;margin-top:10px;border-top:1px solid #e0e0d8;padding-top:7px}
#map{height:260px;border-radius:10px;border:1px solid #e0e0d8;overflow:hidden}
.map-note{font-size:12px;color:#777;margin-top:7px}
label{display:block;font-size:13px;color:#444;margin-bottom:4px;margin-top:14px;font-weight:500}
.field-hint{font-size:11px;color:#888;margin-top:3px}
.area-row{display:grid;grid-template-columns:1fr 110px;gap:8px}
input,select,textarea{width:100%;font-size:13px;padding:8px 10px;border:1px solid #ccc;border-radius:8px;background:#fff;color:#1a1a1a;outline:none;font-family:inherit}
input:focus,select:focus,textarea:focus{border-color:#378ADD;box-shadow:0 0 0 2px #E6F1FB}
textarea{resize:vertical;min-height:85px}
.aviso{background:#FAEEDA;border:1px solid #854F0B;border-radius:8px;padding:12px 14px;margin-top:16px}
.aviso-titulo{font-size:12px;font-weight:700;color:#633806;margin-bottom:5px}
.aviso p{font-size:12px;color:#854F0B;line-height:1.6}
.btn-submit{width:100%;margin-top:18px;padding:11px;background:#042C53;color:#E6F1FB;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-submit:hover{background:#185FA5}
.contact-bar{background:#0C447C;color:#B5D4F4;font-size:12px;text-align:center;padding:12px 1rem;margin-top:1.25rem}
.contact-bar a{color:#85B7EB;text-decoration:none}
.footer{text-align:center;font-size:11px;color:#aaa;padding:1rem}
@media(max-width:600px){.hero .marca{font-size:20px}.cards{grid-template-columns:1fr}.area-row{grid-template-columns:1fr 90px}}
</style>
</head>
